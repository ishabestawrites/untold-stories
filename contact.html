<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Devbhoomipedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #f4f9f4, #e8f5e9);
            color: #2e3d2f;
            line-height: 1.6;
        }

        header {
            background: #2e7d32;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 60px 20px;
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #1b5e20;
            margin-bottom: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #c8e6c9;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2e7d32;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #1b5e20;
        }

        .contact-info {
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1b5e20;
            color: white;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            section {
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Devbhoomipedia</h1>
    <p>Connect With the Mountains</p>
</header>

<section>
    <div class="card">
        <h2>Contact Us</h2>

        <div class="contact-info">
            <p>Email: yourname@email.com</p>
            <p>Location: Himachal Pradesh, India</p>
            <p>Website: www.devbhoomipedia.com</p>
        </div>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
</section>

<footer>
    <p>© 2026 Devbhoomipedia | Made with love in the mountains</p>
</footer>

</body>
</html>
